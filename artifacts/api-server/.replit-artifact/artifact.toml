kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "uvicorn src.main:app --reload --port 8080 --host 0.0.0.0 --log-level debug"

[services.production]

[services.production.build]
args = []

[services.production.run]
args = ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8080", "--workers", "4", "--log-level", "info"]

[services.production.run.env]
PORT = "8080"
ENVIRONMENT = "production"

[services.production.health.startup]
path = "/api/healthz"
