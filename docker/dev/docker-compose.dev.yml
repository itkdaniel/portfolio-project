#
# docker/dev/docker-compose.dev.yml
# Local development stack:
#   - postgres (with persistent volume)
#   - api (Python FastAPI, hot-reload)
#   - web (TypeScript Vite React SPA, HMR)
# =============================================================================

name: synaptiq-dev

services:

  # --------------------------------------------------------------------------
  # PostgreSQL 16 — development database
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: synaptiq
      POSTGRES_PASSWORD: synaptiq_dev
      POSTGRES_DB: synaptiq_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synaptiq -d synaptiq_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # API — Python FastAPI with hot-reload
  # --------------------------------------------------------------------------
  api:
    build:
      context: ../..         # workspace root
      dockerfile: docker/dev/Dockerfile
    env_file:
      - .env.dev             # docker/dev/.env.dev (gitignored)
    environment:
      DATABASE_URL: "postgresql+asyncpg://synaptiq:synaptiq_dev@postgres:5432/synaptiq_dev"
      ENVIRONMENT: development
      DEBUG: "true"
      PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - ../../artifacts/api-server/src:/app/src:ro   # hot-reload source
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Web — TypeScript Vite + React (unchanged frontend)
  # --------------------------------------------------------------------------
  web:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm --filter @workspace/platform run dev --host 0.0.0.0 --port 3000"
    volumes:
      - ../../:/workspace
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: "http://localhost:8080"
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_dev_data:
