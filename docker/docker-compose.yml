# Docker Compose for local full-stack development.
# Runs: Postgres, API server, and frontend (Nginx).
#
# Usage:
#   docker compose -f docker/docker-compose.yml up --build
# =============================================================================

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: synaptiq
      POSTGRES_PASSWORD: synaptiq_dev
      POSTGRES_DB: synaptiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synaptiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # API server (Express + Drizzle)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: api-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://synaptiq:synaptiq_dev@postgres:5432/synaptiq
      SESSION_SECRET: ${SESSION_SECRET}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      DEFAULT_OBJECT_STORAGE_BUCKET_ID: ${DEFAULT_OBJECT_STORAGE_BUCKET_ID:-local}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Frontend (Nginx static)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ..
      dockerfile: Dockerfile
      target: frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
